services:
  # Redis 
  redis:
    image: redis:7-alpine
    container_name: snip_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - snip_network

  # FastAPI Backend 
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: snip_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Override Redis URL to point at the redis service in Docker network
      REDIS_URL: redis://redis:6379
      BASE_URL: http://54.91.164.129
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - snip_network

  # React Frontend (Nginx) 
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: /api
    container_name: snip_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - snip_network

#Volumes 
volumes:
  redis_data:

# Network 
networks:
  snip_network:
    driver: bridge
